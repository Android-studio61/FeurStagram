name: Bug report
description: Report a problem with Feurstagram
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough information to reproduce it.

  - type: input
    id: feurstagram-version
    attributes:
      label: Feurstagram version
      description: Which Feurstagram release are you using?
      placeholder: "Example: v1.2.3"
    validations:
      required: true

  - type: input
    id: instagram-version
    attributes:
      label: Instagram version
      description: Which Instagram APK version was patched, if known?
      placeholder: "Example: 426.0.0.0.0"
    validations:
      required: false

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      description: Which part of the app is affected?
      options:
        - Login / account access
        - Feed
        - Explore
        - Reels
        - Stories
        - Direct Messages
        - Notifications
        - Settings dialog / toggles
        - Deep links / opening Instagram links
        - Installation / update
        - Build from source
        - Other
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: "Example: Android 14"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: "Example: Pixel 7, Samsung Galaxy S23..."
    validations:
      required: true

  - type: dropdown
    id: apk-type
    attributes:
      label: APK type
      options:
        - Classic APK
        - Clone APK
        - Built from source
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: install-source
    attributes:
      label: Installation source
      options:
        - GitHub Releases
        - Built locally with patch.sh
        - Other
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Device / APK architecture
      description: Select the architecture if you know it. This helps with arm64 vs 32-bit reports.
      options:
        - arm64-v8a
        - armeabi-v7a / 32-bit
        - x86_64
        - Universal APK
        - Not sure
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Go to ...
        3. Tap ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: feurstagram-settings
    attributes:
      label: Feurstagram settings
      description: List the relevant toggles and whether you cleared cache, restarted, reinstalled, or changed settings recently.
      placeholder: |
        Example:
        - Feed: blocked
        - Reels: blocked
        - Stories: visible
        - Instants: blocked
        - Notes: blocked
        - Permanent lock: enabled/disabled
        - Recently cleared cache or reinstalled: yes/no
    validations:
      required: false

  - type: dropdown
    id: reproducibility
    attributes:
      label: How often does it happen?
      options:
        - Always
        - Often
        - Sometimes
        - Only once
        - Not sure
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots, screen recordings, or logs
      description: Add screenshots, screen recordings, crash logs, or adb logcat output if useful. For Feurstagram logs, try `adb logcat -s "Feurstagram:D"`.
    validations:
      required: false
